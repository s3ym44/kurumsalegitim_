  <polygon points="300,350 330,290 360,350" fill="#d4af37" opacity="0.12"/>
  <circle cx="180" cy="200" r="20" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.2"/>
  <rect x="280" y="180" width="35" height="35" fill="none" stroke="#1e40af" stroke-width="2" opacity="0.15" transform="rotate(45 297.5 197.5)"/>
</svg>

<!-- Hexagon Pattern -->
<svg id="hexagon-pattern" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="hexagons" width="50" height="43.4" patternUnits="userSpaceOnUse" patternTransform="scale(0.5)">
      <polygon points="25,0 50,14.4 50,43.4 25,57.8 0,43.4 0,14.4" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="100" height="100" fill="url(#hexagons)"/>
</svg>

