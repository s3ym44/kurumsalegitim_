<!-- Geometric Pattern Divider -->
<svg id="pattern-divider" viewBox="0 0 1200 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <defs>
    <linearGradient id="grad-divider" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:0.1"/>
      <stop offset="50%" style="stop-color:#d4af37;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <path d="M0 50 Q300 0 600 50 T1200 50" fill="none" stroke="url(#grad-divider)" stroke-width="2"/>
  <circle cx="200" cy="50" r="4" fill="#d4af37" opacity="0.5"/>
  <circle cx="400" cy="30" r="3" fill="#1e40af" opacity="0.3"/>
  <circle cx="600" cy="50" r="5" fill="#d4af37" opacity="0.6"/>
  <circle cx="800" cy="70" r="3" fill="#1e40af" opacity="0.3"/>
  <circle cx="1000" cy="50" r="4" fill="#d4af37" opacity="0.5"/>
  <polygon points="580,45 600,35 620,45 600,55" fill="#d4af37" opacity="0.4"/>
</svg>

