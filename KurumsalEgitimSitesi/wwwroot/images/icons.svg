<!-- Custom Logo -->
<svg id="logo" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#f5d67a"/>
    </linearGradient>
    <linearGradient id="logo-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Logo Mark -->
  <polygon points="10,50 30,10 50,50" fill="url(#logo-blue)"/>
  <polygon points="20,50 30,25 40,50" fill="url(#logo-gold)"/>
  <circle cx="30" cy="18" r="5" fill="url(#logo-gold)"/>
  <!-- Decorative Lines -->
  <line x1="55" y1="15" x2="55" y2="45" stroke="#d4af37" stroke-width="1"/>
</svg>
