<!-- Kişisel Gelişim Icon -->
<svg id="icon-personal-development" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="50%" style="stop-color:#f5d67a"/>
      <stop offset="100%" style="stop-color:#b8941f"/>
    </linearGradient>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <circle cx="60" cy="35" r="18" fill="url(#grad-gold)"/>
  <path d="M30 95 Q30 65 60 60 Q90 65 90 95" fill="url(#grad-blue)" opacity="0.9"/>
  <circle cx="50" cy="45" r="8" fill="none" stroke="#d4af37" stroke-width="2"/>
  <path d="M70 30 l8 -12 l8 12" fill="none" stroke="#d4af37" stroke-width="2"/>
  <circle cx="70" cy="15" r="3" fill="#d4af37"/>
</svg>

